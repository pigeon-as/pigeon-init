name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            label: x86_64
          - goarch: arm64
            label: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build init binary
        run: make build ARCH=${{ matrix.goarch }}

      - name: Build initrd
        run: make initrd

      - name: Package
        run: tar -C out -czf "pigeon-init-${{ github.ref_name }}-${{ matrix.label }}.tar.gz" initrd.cpio

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: initrd-${{ matrix.label }}-${{ github.ref_name }}
          path: pigeon-init-${{ github.ref_name }}-${{ matrix.label }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release/

      - name: Release
        run: |
          gh release create "${{ github.ref_name }}" release/* \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes "pigeon-init ${{ github.ref_name }} — initrd.cpio for Firecracker micro-VMs" \
          || gh release upload "${{ github.ref_name }}" release/* \
            --repo "${{ github.repository }}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
